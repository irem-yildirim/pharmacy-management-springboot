<!-- src/main/resources/templates/settings/index.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
    <main class="space-y-8">
        
        <!-- Page Title -->
        <div class="flex items-center justify-between border-b border-slate-100 pb-5">
            <div>
                <h2 class="text-2xl font-bold text-slate-900 tracking-tight">System Settings</h2>
                <p class="text-sm text-slate-400 font-medium">Manage drug manufacturers, classification categories, and enterprise user access</p>
            </div>
        </div>

        <!-- Triple Tabs -->
        <div class="flex gap-2 p-1 bg-slate-100 rounded-2xl w-fit">
            <button onclick="switchTab('brands-tab')" id="tab-brands" 
                    class="px-5 py-2.5 rounded-xl font-bold text-sm transition-all duration-200 bg-white text-indigo-600 shadow-sm">
                Brands
            </button>
            <button onclick="switchTab('categories-tab')" id="tab-categories" 
                    class="px-5 py-2.5 rounded-xl font-bold text-sm transition-all duration-200 text-slate-500 hover:text-slate-900">
                Categories
            </button>
            <button sec:authorize="hasRole('ADMIN')" onclick="switchTab('staff-tab')" id="tab-staff" 
                    class="px-5 py-2.5 rounded-xl font-bold text-sm transition-all duration-200 text-slate-500 hover:text-slate-900">
                Staff Management
            </button>
        </div>

        <!-- TAB 1: Brands Panel -->
        <div id="brands-tab" class="block">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Left: Create Form -->
                <div class="lg:col-span-4 bg-white rounded-3xl border border-slate-100 shadow-xl shadow-slate-100/40 p-8 h-fit">
                    <h3 class="font-bold text-slate-900 mb-6">Add New Brand</h3>
                    <form id="brand-form" class="space-y-4">
                        <div>
                            <label for="brand-name" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Brand Name</label>
                            <input type="text" id="brand-name" required
                                   class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-all duration-200"
                                   placeholder="e.g. Pfizer">
                        </div>
                        <button type="submit" id="brand-submit"
                                class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm rounded-xl shadow-lg shadow-indigo-100 hover:shadow-xl hover:shadow-indigo-200/50 active:scale-[0.98] transition-all duration-200">
                            Save Brand
                        </button>
                    </form>
                </div>

                <!-- Right: Brand Table -->
                <div class="lg:col-span-8 bg-white rounded-3xl border border-slate-100 shadow-xl shadow-slate-100/40 overflow-hidden min-h-[300px]">
                    <table class="w-full text-left border-collapse table-fixed">
                        <thead>
                            <tr class="bg-slate-50/50 border-b border-slate-100 text-[11px] font-bold text-slate-400 uppercase tracking-wider">
                                <th class="w-24 py-4 px-6">ID</th>
                                <th class="py-4 px-6">Brand Name</th>
                                <th class="w-28 py-4 px-6 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="brand-table-body" class="divide-y divide-slate-100 text-sm text-slate-600">
                            <tr>
                                <td colspan="3" class="py-8 text-center text-slate-400">Loading brands...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- TAB 2: Categories Panel -->
        <div id="categories-tab" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Left: Create Form -->
                <div class="lg:col-span-4 bg-white rounded-3xl border border-slate-100 shadow-xl shadow-slate-100/40 p-8 h-fit">
                    <h3 class="font-bold text-slate-900 mb-6">Add New Category</h3>
                    <form id="category-form" class="space-y-4">
                        <div>
                            <label for="category-name" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Category Name</label>
                            <input type="text" id="category-name" required
                                   class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-all duration-200"
                                   placeholder="e.g. Antibiotics">
                        </div>
                        <button type="submit" id="category-submit"
                                class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm rounded-xl shadow-lg shadow-indigo-100 hover:shadow-xl hover:shadow-indigo-200/50 active:scale-[0.98] transition-all duration-200">
                            Save Category
                        </button>
                    </form>
                </div>

                <!-- Right: Category Table -->
                <div class="lg:col-span-8 bg-white rounded-3xl border border-slate-100 shadow-xl shadow-slate-100/40 overflow-hidden min-h-[300px]">
                    <table class="w-full text-left border-collapse table-fixed">
                        <thead>
                            <tr class="bg-slate-50/50 border-b border-slate-100 text-[11px] font-bold text-slate-400 uppercase tracking-wider">
                                <th class="w-24 py-4 px-6">ID</th>
                                <th class="py-4 px-6">Category Name</th>
                                <th class="w-28 py-4 px-6 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="category-table-body" class="divide-y divide-slate-100 text-sm text-slate-600">
                            <tr>
                                <td colspan="3" class="py-8 text-center text-slate-400">Loading categories...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- TAB 3: Staff Management Panel (ADMIN only) -->
        <div sec:authorize="hasRole('ADMIN')" id="staff-tab" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Left: Create Form -->
                <div class="lg:col-span-4 bg-white rounded-3xl border border-slate-100 shadow-xl shadow-slate-100/40 p-8 h-fit">
                    <h3 class="font-bold text-slate-900 mb-6">Register New Staff</h3>
                    <form id="staff-form" class="space-y-4">
                        <div>
                            <label for="staff-name" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Full Name</label>
                            <input type="text" id="staff-name" required
                                   class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-all duration-200"
                                   placeholder="e.g. Ayse Demir">
                        </div>

                        <div>
                            <label for="staff-username" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Username</label>
                            <input type="text" id="staff-username" required
                                   class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-all duration-200"
                                   placeholder="e.g. cashier_ayse">
                        </div>

                        <div>
                            <label for="staff-password" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Password</label>
                            <input type="password" id="staff-password" required
                                   class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-all duration-200"
                                   placeholder="••••••••">
                        </div>

                        <div>
                            <label for="staff-role" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Access Role</label>
                            <select id="staff-role" required
                                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-all duration-200">
                                <option value="ADMIN">ADMIN</option>
                                <option value="PHARMACIST">PHARMACIST</option>
                                <option value="CASHIER">CASHIER</option>
                            </select>
                        </div>

                        <button type="submit" id="staff-submit"
                                class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm rounded-xl shadow-lg shadow-indigo-100 hover:shadow-xl hover:shadow-indigo-200/50 active:scale-[0.98] transition-all duration-200">
                            Register User
                        </button>
                    </form>
                </div>

                <!-- Right: Staff List Table -->
                <div class="lg:col-span-8 bg-white rounded-3xl border border-slate-100 shadow-xl shadow-slate-100/40 overflow-hidden min-h-[300px]">
                    <table class="w-full text-left border-collapse table-fixed">
                        <thead>
                            <tr class="bg-slate-50/50 border-b border-slate-100 text-[11px] font-bold text-slate-400 uppercase tracking-wider">
                                <th class="w-24 py-4 px-6">ID</th>
                                <th class="py-4 px-6">Full Name</th>
                                <th class="w-1/3 py-4 px-6">Username</th>
                                <th class="w-32 py-4 px-6 text-center">Role</th>
                            </tr>
                        </thead>
                        <tbody id="staff-table-body" class="divide-y divide-slate-100 text-sm text-slate-600">
                            <tr>
                                <td colspan="4" class="py-8 text-center text-slate-400">Loading staff database...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Settings Logic Script -->
        <script>
        // Tab switching and dynamic highlighting using class toggling
        function switchTab(tabId) {
            const tabMap = {
                'brands-tab': 'tab-brands',
                'categories-tab': 'tab-categories'
            };
            const staffTab = document.getElementById('staff-tab');
            const staffBtn = document.getElementById('tab-staff');
            if (staffTab && staffBtn) {
                tabMap['staff-tab'] = 'tab-staff';
            }
            Object.keys(tabMap).forEach(id => {
                const element = document.getElementById(id);
                const btn = document.getElementById(tabMap[id]);
                if (!element || !btn) return;
                const isActive = id === tabId;
                element.classList.toggle('hidden', !isActive);
                btn.className = isActive
                    ? "px-5 py-2.5 rounded-xl font-bold text-sm transition-all duration-200 bg-white text-indigo-600 shadow-sm"
                    : "px-5 py-2.5 rounded-xl font-bold text-sm transition-all duration-200 text-slate-500 hover:text-slate-900";
            });
        }

        // --- BRANDS CRUD ---
        async function fetchBrands() {
            const tbody = document.getElementById('brand-table-body');
            try {
                const res = await fetch('/api/brands');
                if (!res.ok) throw new Error("Failed to load");
                const brands = await res.json();
                
                if (brands.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="py-8 text-center text-slate-400 font-medium">No brands found.</td></tr>`;
                    return;
                }

                tbody.innerHTML = '';
                brands.forEach(b => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50/50 transition-colors">
                            <td class="py-4 px-6 font-semibold text-slate-400">#${b.id}</td>
                            <td class="py-4 px-6 font-bold text-slate-800">${b.name}</td>
                            <td class="py-4 px-6 text-center">
                                <button onclick="deleteBrand(${b.id})" class="p-1 text-slate-400 hover:text-rose-600 rounded hover:bg-rose-50 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                    </svg>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="3" class="py-8 text-center text-rose-500 font-semibold">Failed to load brands database.</td></tr>`;
            }
        }

        document.getElementById('brand-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('brand-submit');
            const name = document.getElementById('brand-name').value;
            btn.disabled = true;
            try {
                const res = await fetch('/api/brands', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name })
                });
                if (res.ok) {
                    window.showToast("Brand saved successfully!");
                    document.getElementById('brand-form').reset();
                    fetchBrands();
                } else {
                    const txt = await res.text();
                    window.showToast(txt || "Failed to create brand", "error");
                }
            } catch (err) {
                window.showToast("Network error.", "error");
            } finally {
                btn.disabled = false;
            }
        });

        async function deleteBrand(id) {
            if (!confirm("Are you sure you want to delete this brand?")) return;
            try {
                const res = await fetch(`/api/brands/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    window.showToast("Brand deleted.");
                    fetchBrands();
                } else {
                    const txt = await res.text();
                    window.showToast(txt || "Cannot delete: Existing drugs are linked to this entity.", "error");
                }
            } catch (err) {
                window.showToast("Cannot delete: Existing drugs are linked to this entity.", "error");
            }
        }

        // --- CATEGORIES CRUD ---
        async function fetchCategories() {
            const tbody = document.getElementById('category-table-body');
            try {
                const res = await fetch('/api/categories');
                if (!res.ok) throw new Error("Failed to load");
                const categories = await res.json();

                if (categories.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="py-8 text-center text-slate-400 font-medium">No categories found.</td></tr>`;
                    return;
                }

                tbody.innerHTML = '';
                categories.forEach(c => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50/50 transition-colors">
                            <td class="py-4 px-6 font-semibold text-slate-400">#${c.id}</td>
                            <td class="py-4 px-6 font-bold text-slate-800">${c.name}</td>
                            <td class="py-4 px-6 text-center">
                                <button onclick="deleteCategory(${c.id})" class="p-1 text-slate-400 hover:text-rose-600 rounded hover:bg-rose-50 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                    </svg>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="3" class="py-8 text-center text-rose-500 font-semibold">Failed to load categories database.</td></tr>`;
            }
        }

        document.getElementById('category-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('category-submit');
            const name = document.getElementById('category-name').value;
            btn.disabled = true;
            try {
                const res = await fetch('/api/categories', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name })
                });
                if (res.ok) {
                    window.showToast("Category saved successfully!");
                    document.getElementById('category-form').reset();
                    fetchCategories();
                } else {
                    const txt = await res.text();
                    window.showToast(txt || "Failed to create category", "error");
                }
            } catch (err) {
                window.showToast("Network error.", "error");
            } finally {
                btn.disabled = false;
            }
        });

        async function deleteCategory(id) {
            if (!confirm("Are you sure you want to delete this category?")) return;
            try {
                const res = await fetch(`/api/categories/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    window.showToast("Category deleted.");
                    fetchCategories();
                } else {
                    const txt = await res.text();
                    window.showToast(txt || "Cannot delete: Existing drugs are linked to this entity.", "error");
                }
            } catch (err) {
                window.showToast("Cannot delete: Existing drugs are linked to this entity.", "error");
            }
        }

        // --- STAFF MANAGEMENT CRUD ---
        async function fetchStaff() {
            const tbody = document.getElementById('staff-table-body');
            if (!tbody) return;
            try {
                const res = await fetch('/api/users');
                if (!res.ok) throw new Error("Failed to load");
                const staff = await res.json();
                tbody.innerHTML = '';
                staff.forEach(u => {
                    let badgeClass = 'bg-slate-100 text-slate-600 border-slate-200';
                    if (u.role === 'ADMIN') badgeClass = 'bg-indigo-50 text-indigo-700 border-indigo-150';
                    else if (u.role === 'PHARMACIST') badgeClass = 'bg-emerald-50 text-emerald-700 border-emerald-150';
                    
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50/50 transition-colors">
                            <td class="py-4 px-6 font-semibold text-slate-400">#${u.id}</td>
                            <td class="py-4 px-6 font-bold text-slate-800">${u.name}</td>
                            <td class="py-4 px-6 font-medium text-slate-500">${u.username}</td>
                            <td class="py-4 px-6 text-center">
                                <span class="px-3 py-1 text-[10px] font-bold rounded-lg border uppercase tracking-wider ${badgeClass}">${u.role}</span>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="py-8 text-center text-rose-500 font-semibold">Failed to load staff database.</td></tr>`;
            }
        }

        const staffForm = document.getElementById('staff-form');
        if (staffForm) {
            staffForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const btn = document.getElementById('staff-submit');
                const name = document.getElementById('staff-name').value;
                const username = document.getElementById('staff-username').value;
                const password = document.getElementById('staff-password').value;
                const role = document.getElementById('staff-role').value;

                btn.disabled = true;
                try {
                    const res = await fetch('/api/users', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: name,
                            username: username,
                            password: password,
                            role: role
                        })
                    });
                    if (res.ok) {
                        window.showToast("Staff user registered successfully!");
                        document.getElementById('staff-form').reset();
                        fetchStaff();
                    } else {
                        const txt = await res.text();
                        window.showToast(txt || "Failed to register user.", "error");
                    }
                } catch (err) {
                    window.showToast("Network error.", "error");
                } finally {
                    btn.disabled = false;
                }
            });
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            fetchBrands();
            fetchCategories();
            fetchStaff();
        });
    </script>
    </main>
</body>
</html>
