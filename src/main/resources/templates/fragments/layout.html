<!-- src/main/resources/templates/fragments/layout.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex h-screen overflow-hidden">

    <!-- Sidebar Navigation -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col justify-between h-full shrink-0">
        <div>
            <!-- Sidebar Header -->
            <div class="px-6 py-6 border-b border-slate-100 flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white font-bold text-lg shadow-md shadow-indigo-100">
                    P
                </div>
                <div>
                    <h2 class="font-bold text-slate-900 leading-tight">PharmacyOS</h2>
                    <span class="text-xs text-slate-400 font-medium">Enterprise Suite</span>
                </div>
            </div>

            <!-- Navigation Links -->
            <nav class="px-4 py-6 space-y-1">
                <a href="/dashboard" th:class="${currentUri == '/dashboard' or currentUri == '/' ? 'flex items-center gap-3 px-4 py-3 text-sm font-semibold rounded-xl transition-all duration-200 group bg-indigo-50 text-indigo-600' : 'flex items-center gap-3 px-4 py-3 text-sm font-semibold text-slate-500 rounded-xl hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group'}">
                    <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"/>
                    </svg>
                    <span>Dashboard</span>
                </a>

                <a href="/pos" th:class="${currentUri == '/pos' ? 'flex items-center gap-3 px-4 py-3 text-sm font-semibold rounded-xl transition-all duration-200 group bg-indigo-50 text-indigo-600' : 'flex items-center gap-3 px-4 py-3 text-sm font-semibold text-slate-500 rounded-xl hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group'}">
                    <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                    </svg>
                    <span>POS Terminal</span>
                </a>

                <a href="/inventory" th:class="${currentUri == '/inventory' ? 'flex items-center gap-3 px-4 py-3 text-sm font-semibold rounded-xl transition-all duration-200 group bg-indigo-50 text-indigo-600' : 'flex items-center gap-3 px-4 py-3 text-sm font-semibold text-slate-500 rounded-xl hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group'}">
                    <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                    </svg>
                    <span>Inventory</span>
                </a>
            </nav>
        </div>

        <!-- Sidebar Footer / User Profile -->
        <div class="px-4 py-4 border-t border-slate-100 bg-slate-50/50">
            <div class="flex items-center gap-3 px-2 py-2">
                <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center font-bold text-slate-600 text-sm">
                    PH
                </div>
                <div class="overflow-hidden">
                    <h4 class="text-sm font-semibold text-slate-800 truncate">Active User</h4>
                    <span class="text-xs text-slate-400 font-medium truncate block">Authorized Pharmacist</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Section -->
    <div class="flex-1 flex flex-col h-full overflow-hidden">
        <!-- Top Header -->
        <header class="bg-white border-b border-slate-200 px-8 py-5 flex items-center justify-between shrink-0">
            <div>
                <h1 class="text-xl font-bold text-slate-950">Pharmacy Control Panel</h1>
                <p class="text-xs text-slate-400 font-medium">Real-time analytical and operational suite</p>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="text-right hidden md:block">
                    <span class="text-xs font-semibold text-slate-400 block">System Time</span>
                    <span id="system-time" class="text-sm font-bold text-slate-700">Loading...</span>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto p-8 bg-slate-50">
            <div th:replace="${content}"></div>
        </main>
    </div>

    <!-- Hidden Toast Notification Container -->
    <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-3 pointer-events-none w-96 max-w-full"></div>

    <!-- Base JS Scripts -->
    <script>
        // Real-time System clock
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('system-time').textContent = now.toLocaleDateString('en-US', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Global Toast utility
        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-lg border transition-all duration-300 transform translate-y-2 opacity-0 pointer-events-auto flex items-start gap-3 w-full bg-white border-slate-100`;

            const iconSuccess = `<div class="p-1 rounded-lg bg-emerald-100 text-emerald-600 shrink-0">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
            </div>`;

            const iconError = `<div class="p-1 rounded-lg bg-rose-100 text-rose-600 shrink-0">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </div>`;

            toast.innerHTML = `
                ${type === 'success' ? iconSuccess : iconError}
                <div class="flex-1">
                    <h5 class="text-sm font-semibold text-slate-800">${type === 'success' ? 'Operation Success' : 'System Error'}</h5>
                    <p class="text-xs text-slate-500 mt-0.5">${message}</p>
                </div>
                <button class="text-slate-400 hover:text-slate-600 shrink-0 self-center" onclick="this.parentElement.remove()">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            `;

            container.appendChild(toast);

            // Reflow to trigger CSS transitions
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 10);

            // Auto dismiss after 4 seconds
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-10px]');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        };
    </script>
</body>
</html>
