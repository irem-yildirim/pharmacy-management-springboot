<!-- src/main/resources/templates/customers/list.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
    <main class="space-y-8">

        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h2 class="text-2xl font-bold text-slate-900">Customer Management</h2>
                <p class="text-sm text-slate-500">Manage registered patients, their balances, and purchase history</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="openAddCustomerModal()" class="px-5 py-3 bg-indigo-600 hover:bg-indigo-700 active:scale-[0.98] text-white font-bold rounded-xl text-sm transition duration-200 flex items-center gap-2 shadow-md shadow-indigo-100 group">
                    <svg class="w-4 h-4 text-indigo-100 transition-transform group-hover:rotate-90" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                    </svg>
                    <span>Add New Customer</span>
                </button>
            </div>
        </div>

        <div class="bg-white border border-slate-200/80 shadow-sm rounded-2xl overflow-hidden flex flex-col">
            <div class="p-6 border-b border-slate-100 bg-slate-50/30 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="relative flex-1 max-w-md">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </div>
                    <input type="text" id="search-input" oninput="filterCustomers()"
                           placeholder="Search customers by name or phone..."
                           class="block w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-slate-800 font-medium placeholder-slate-400 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 focus:outline-none transition text-sm" />
                </div>
                <span id="customer-count-badge" class="text-xs font-semibold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">0 Customers</span>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse" id="customer-table">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-100 text-[11px] font-bold tracking-wider text-slate-400 uppercase">
                            <th class="px-6 py-4">Customer Name</th>
                            <th class="px-6 py-4">Phone</th>
                            <th class="px-6 py-4 text-right">Balance</th>
                            <th class="px-6 py-4 text-center">Status</th>
                            <th class="px-6 py-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm divide-y divide-slate-100 text-slate-700" id="customer-table-body">
                        <tr>
                            <td colspan="5" class="px-6 py-12 text-center text-slate-400 font-medium">
                                <div class="flex flex-col items-center justify-center gap-2">
                                    <svg class="animate-spin w-8 h-8 text-indigo-500" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                    <span>Loading customer records...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add Customer Modal -->
        <div id="add-customer-modal" class="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 hidden">
            <div class="bg-white border border-slate-200 shadow-2xl rounded-2xl w-full max-w-lg overflow-hidden transform transition-all duration-300 scale-95 opacity-0" id="modal-card">
                <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between">
                    <div>
                        <h3 class="text-lg font-bold text-slate-950">Register New Customer</h3>
                        <p class="text-xs text-slate-400 mt-0.5">Add a new patient or customer account</p>
                    </div>
                    <button onclick="closeAddCustomerModal()" class="text-slate-400 hover:text-slate-600 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <form id="add-customer-form" onsubmit="saveCustomer(event)" class="p-6 space-y-4">
                    <div>
                        <label for="customer-name" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Full Name</label>
                        <input type="text" id="customer-name" required placeholder="Enter customer full name"
                               class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm font-medium placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 focus:outline-none transition" />
                    </div>
                    <div>
                        <label for="customer-phone" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Phone Number</label>
                        <input type="text" id="customer-phone" placeholder="Enter phone number"
                               class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm font-medium placeholder-slate-400 focus:bg-white focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 focus:outline-none transition" />
                    </div>
                    <div>
                        <label for="customer-balance" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Initial Balance ($)</label>
                        <input type="number" id="customer-balance" step="0.01" min="0" value="0.00"
                               class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm font-medium focus:bg-white focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 focus:outline-none transition" />
                    </div>
                    <div class="pt-4 border-t border-slate-100 flex items-center justify-end gap-3">
                        <button type="button" onclick="closeAddCustomerModal()" class="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold rounded-xl text-sm transition">Cancel</button>
                        <button type="submit" id="btn-save-customer" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-sm transition shadow-md shadow-indigo-100 flex items-center gap-2">
                            <span>Save Customer</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            let allCustomers = [];

            async function fetchCustomers() {
                try {
                    const response = await fetch('/api/customers');
                    if (response.ok) {
                        allCustomers = await response.json();
                        renderCustomers(allCustomers);
                    } else {
                        showToast('Failed to fetch customers', 'error');
                    }
                } catch (error) {
                    console.error('Error fetching customers:', error);
                    showToast('Connection error', 'error');
                }
            }

            function renderCustomers(list) {
                const tbody = document.getElementById('customer-table-body');
                const badge = document.getElementById('customer-count-badge');
                badge.textContent = list.length + ' Customer' + (list.length === 1 ? '' : 's');

                if (list.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-12 text-center text-slate-400 font-medium">No customers registered yet.</td></tr>';
                    return;
                }

                let html = '';
                list.forEach(customer => {
                    html += `
                        <tr class="hover:bg-slate-50/50 transition cursor-pointer" onclick="toggleHistoryDrawer(this, ${customer.id})">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-9 h-9 rounded-xl bg-indigo-100 flex items-center justify-center font-bold text-sm text-indigo-600">
                                        ${(customer.name || '?').charAt(0).toUpperCase()}
                                    </div>
                                    <span class="font-bold text-slate-900">${customer.name}</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-slate-500 font-medium">${customer.phone || 'N/A'}</td>
                            <td class="px-6 py-4 text-right font-extrabold ${parseFloat(customer.balance || 0) < 0 ? 'text-rose-600' : 'text-slate-900'}">$${parseFloat(customer.balance || 0).toFixed(2)}</td>
                            <td class="px-6 py-4 text-center">
                                ${customer.active
                                    ? '<span class="px-2.5 py-0.5 rounded-lg text-[10px] bg-emerald-50 text-emerald-700 font-bold border border-emerald-150">Active</span>'
                                    : '<span class="px-2.5 py-0.5 rounded-lg text-[10px] bg-slate-100 text-slate-400 font-bold border border-slate-200">Inactive</span>'}
                            </td>
                            <td class="px-6 py-4 text-center">
                                <svg class="w-4 h-4 inline text-slate-400 transform transition-transform history-arrow-${customer.id}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                                </svg>
                            </td>
                        </tr>
                        <tr class="hidden bg-slate-50/30 history-drawer-${customer.id}">
                            <td colspan="5" class="px-8 py-4">
                                <div class="space-y-2">
                                    <div class="flex items-center justify-between">
                                        <div class="text-xs font-bold text-slate-600 uppercase tracking-wider">Purchase History for ${customer.name}</div>
                                        <button onclick="event.stopPropagation(); refreshHistory(${customer.id})" class="text-[10px] text-indigo-500 hover:text-indigo-700 font-bold">Refresh</button>
                                    </div>
                                    <div id="history-content-${customer.id}" class="text-xs text-slate-400 italic py-2">
                                        Click to load purchase history...
                                    </div>
                                </div>
                            </td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            }

            async function loadPurchaseHistory(customerId) {
                const container = document.getElementById('history-content-' + customerId);
                if (!container) return;

                container.innerHTML = '<div class="flex items-center gap-2 text-slate-400"><svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>Loading...</div>';

                try {
                    const response = await fetch('/api/sales?customerId=' + customerId);
                    if (response.ok) {
                        const sales = await response.json();
                        if (sales.length === 0) {
                            container.innerHTML = '<p class="text-slate-400 italic">No purchase history found for this customer.</p>';
                            return;
                        }

                        let html = '<div class="overflow-x-auto"><table class="w-full text-left text-xs"><thead><tr class="border-b border-slate-200 text-slate-400"><th class="py-2 pr-4">Sale Date</th><th class="py-2 pr-4">Drug Name</th><th class="py-2 pr-4">Qty</th><th class="py-2 pr-4">Unit Price</th><th class="py-2 pr-4">Purchase Cost</th><th class="py-2 pr-4">Batch ID</th><th class="py-2 pr-4">Expiry Date</th><th class="py-2 pr-4">Prescription</th></tr></thead><tbody>';

                        sales.forEach(sale => {
                            const date = new Date(sale.saleDate).toLocaleString('en-US', {
                                year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                            });
                            const items = sale.items || [];
                            if (items.length === 0) {
                                html += `<tr class="border-b border-slate-100">
                                    <td class="py-2 pr-4 text-slate-500">${date}</td>
                                    <td colspan="7" class="py-2 pr-4 text-slate-400 italic">No items</td>
                                </tr>`;
                            } else {
                                items.forEach((item, idx) => {
                                    html += `<tr class="border-b border-slate-100">
                                        <td class="py-2 pr-4 text-slate-500">${idx === 0 ? date : ''}</td>
                                        <td class="py-2 pr-4 font-bold text-slate-800">${item.drugName || 'N/A'}</td>
                                        <td class="py-2 pr-4 text-center font-semibold">${item.quantity}</td>
                                        <td class="py-2 pr-4 text-slate-600">$${parseFloat(item.unitPrice || 0).toFixed(2)}</td>
                                        <td class="py-2 pr-4 text-slate-600">$${parseFloat(item.purchasePrice || 0).toFixed(2)}</td>
                                        <td class="py-2 pr-4"><span class="font-mono text-slate-500">#${item.purchaseId || 'N/A'}</span></td>
                                        <td class="py-2 pr-4 text-slate-500">${item.expirationDate || 'N/A'}</td>
                                        <td class="py-2 pr-4">${sale.prescriptionLogged ? '<span class="px-2 py-0.5 rounded text-[10px] bg-indigo-50 text-indigo-700 font-bold border border-indigo-150">Yes</span>' : '<span class="px-2 py-0.5 rounded text-[10px] bg-slate-100 text-slate-400 font-bold">No</span>'}</td>
                                    </tr>`;
                                });
                            }
                        });

                        html += '</tbody></table></div>';
                        container.innerHTML = html;
                    } else {
                        container.innerHTML = '<p class="text-rose-500 italic">Failed to load purchase history.</p>';
                    }
                } catch (error) {
                    console.error('Error loading history:', error);
                    container.innerHTML = '<p class="text-rose-500 italic">Connection error.</p>';
                }
            }

            function toggleHistoryDrawer(row, customerId) {
                const drawerRow = row.nextElementSibling;
                const arrow = document.querySelector('.history-arrow-' + customerId);
                if (drawerRow.classList.contains('hidden')) {
                    drawerRow.classList.remove('hidden');
                    if (arrow) arrow.style.transform = 'rotate(180deg)';
                    loadPurchaseHistory(customerId);
                } else {
                    drawerRow.classList.add('hidden');
                    if (arrow) arrow.style.transform = 'rotate(0deg)';
                }
            }

            function refreshHistory(customerId) {
                loadPurchaseHistory(customerId);
            }

            function filterCustomers() {
                const query = document.getElementById('search-input').value.toLowerCase().trim();
                if (query === '') { renderCustomers(allCustomers); return; }
                const filtered = allCustomers.filter(c =>
                    (c.name || '').toLowerCase().includes(query) ||
                    (c.phone || '').toLowerCase().includes(query)
                );
                renderCustomers(filtered);
            }

            function openAddCustomerModal() {
                const modal = document.getElementById('add-customer-modal');
                const card = document.getElementById('modal-card');
                modal.classList.remove('hidden');
                setTimeout(() => { card.classList.remove('scale-95', 'opacity-0'); card.classList.add('scale-100', 'opacity-100'); }, 10);
            }

            function closeAddCustomerModal() {
                const modal = document.getElementById('add-customer-modal');
                const card = document.getElementById('modal-card');
                card.classList.add('scale-95', 'opacity-0');
                card.classList.remove('scale-100', 'opacity-100');
                setTimeout(() => { modal.classList.add('hidden'); document.getElementById('add-customer-form').reset(); }, 300);
            }

            async function saveCustomer(event) {
                event.preventDefault();
                const btn = document.getElementById('btn-save-customer');
                const name = document.getElementById('customer-name').value.trim();
                const phone = document.getElementById('customer-phone').value.trim();
                const balance = parseFloat(document.getElementById('customer-balance').value) || 0;

                if (name === '') {
                    showToast('Customer name is required', 'error');
                    return;
                }

                btn.disabled = true;
                const originalText = btn.innerHTML;
                btn.innerHTML = '<svg class="animate-spin w-4 h-4 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg><span>Saving...</span>';

                try {
                    const response = await fetch('/api/customers', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, phone, balance })
                    });
                    if (response.ok) {
                        showToast('Customer ' + name + ' registered successfully', 'success');
                        closeAddCustomerModal();
                        fetchCustomers();
                    } else {
                        const err = await response.json();
                        showToast(err.message || 'Error occurred', 'error');
                    }
                } catch (error) {
                    console.error('Error saving customer:', error);
                    showToast('Connection error', 'error');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            }

            window.addEventListener('DOMContentLoaded', () => { fetchCustomers(); });
        </script>
    </main>
</body>
</html>
